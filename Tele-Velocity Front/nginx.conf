server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve files directly, but fall back to index.html for SPA routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: block access to hidden files
    location ~ /\. {
        deny all;
    }
}
